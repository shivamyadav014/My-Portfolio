<!DOCTYPE html>
<html lang="en">
<head>
<script>
/* ALL GLOBAL FUNCTIONS — defined at parse time in <head> */
var FORMSPREE_ID = 'mjgalgeg';

window.handleSend = handleSend;
window.handleFormSubmit = handleFormSubmit;
window.resetForm  = resetForm;
window.switchTab  = switchTab;
window.filterProj = filterProj;
window.toggleTheme = toggleTheme;
window.triggerPhotoUpload = triggerPhotoUpload;

function submitForm() {
  var name  = (document.getElementById('inp-name')  || {}).value || '';
  var email = (document.getElementById('inp-email') || {}).value || '';
  var msg   = (document.getElementById('inp-msg')   || {}).value || '';
  var errEl = document.getElementById('inp-err');
  var btn   = document.getElementById('submit-btn');

  name = name.trim(); email = email.trim(); msg = msg.trim();

  if (!name || !email || !msg) {
    if (errEl) { errEl.textContent = '⚠ Please fill in all fields.'; errEl.style.display = 'block'; }
    return;
  }
  if (email.indexOf('@') < 1) {
    if (errEl) { errEl.textContent = '⚠ Please enter a valid email.'; errEl.style.display = 'block'; }
    return;
  }
  if (errEl) errEl.style.display = 'none';
  if (btn)   { btn.textContent = 'Sending...'; btn.disabled = true; btn.style.opacity = '0.6'; }

  var params = new URLSearchParams();
  params.append('name', name);
  params.append('email', email);
  params.append('message', msg);

  fetch('https://formspree.io/f/mjgalgeg', {
    method: 'POST',
    body: params,
    headers: { 'Accept': 'application/json' }
  })
  .then(function(r) {
    if (btn) { btn.textContent = 'Send Message ✉️'; btn.disabled = false; btn.style.opacity = '1'; }
    if (r.ok) {
      showSuccess();
    } else {
      r.json().then(function(d) {
        var m = (d && d.errors) ? d.errors.map(function(e){ return e.message; }).join(', ') : 'Submission failed. Please try again.';
        if (errEl) { errEl.textContent = '❌ ' + m; errEl.style.display = 'block'; }
      }).catch(function() {
        if (errEl) { errEl.textContent = '❌ Submission failed. Please try again.'; errEl.style.display = 'block'; }
      });
    }
  })
  .catch(function() {
    if (btn) { btn.textContent = 'Send Message ✉️'; btn.disabled = false; btn.style.opacity = '1'; }
    if (errEl) { errEl.textContent = '❌ Could not connect. Please email: rk36299239@gmail.com'; errEl.style.display = 'block'; }
  });
}

function showSuccess() {
  var form    = document.getElementById('myform');
  var success = document.getElementById('form-success');
  if (form)    form.style.display    = 'none';
  if (success) success.style.display = 'block';
  ['inp-name','inp-email','inp-msg'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.value = '';
  });
}

function handleSend() { submitForm(); }
function handleFormSubmit(e) { if(e) e.preventDefault(); submitForm(); }

function resetForm(){
  var ids=['cf-name','cf-email','cf-message'];
  for(var i=0;i<ids.length;i++){
    var el=document.getElementById(ids[i]);
    if(el) el.value='';
  }
  var f=document.getElementById('form-fields');
  var s=document.getElementById('form-success');
  if(f) f.style.display='block';
  if(s) s.style.display='none';
}

function triggerPhotoUpload(){
  var input=document.getElementById('photo-input');
  if(input) input.click();
}

function toggleTheme(){
  var body=document.body;
  var btn=document.getElementById('theme-toggle');
  var icon=btn?btn.querySelector('.toggle-icon'):null;
  var lbl=btn?btn.querySelector('.toggle-label'):null;
  if(body.classList.contains('light-mode')){
    body.classList.remove('light-mode');
    localStorage.setItem('theme','dark');
    if(icon) icon.textContent='🌙';
    if(lbl)  lbl.textContent='Dark';
  } else {
    body.classList.add('light-mode');
    localStorage.setItem('theme','light');
    if(icon) icon.textContent='☀️';
    if(lbl)  lbl.textContent='Light';
  }
}

function switchTab(id,btn){
  document.querySelectorAll('.resume-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('active');});
  var panel=document.getElementById('tab-'+id);
  if(panel) panel.classList.add('active');
  if(btn)   btn.classList.add('active');
}

function filterProj(cat,btn){
  document.querySelectorAll('.pftab').forEach(function(t){t.classList.remove('active');});
  if(btn) btn.classList.add('active');
  document.querySelectorAll('#proj-grid .proj-card').forEach(function(card){
    card.style.display=(cat==='all'||card.dataset.cat===cat)?'flex':'none';
  });
}
</script>

.skill-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(34,197,94,0.12); }
.skill-icon { font-size: 1.5rem; margin-bottom: 0.7rem; }
.skill-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 0.87rem; color: var(--white); margin-bottom: 0.7rem; }
.skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.stag { font-size: 0.69rem; padding: 0.2rem 0.55rem; background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.22); border-radius: 3px; color: var(--accent); }

/* ─────────── PROJECTS ─────────── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1.4rem; }
.proj-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.8rem;
  display: flex; flex-direction: column;
  transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden;
}
.proj-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.2s;
}
.proj-card:hover { border-color: rgba(34,197,94,.5); transform: translateY(-4px); }
.proj-card:hover::after { opacity: 1; }
.proj-date { font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.7rem; text-transform: uppercase; }
.proj-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; color: var(--white); margin-bottom: 0.7rem; }
.proj-desc { color: var(--muted); font-size: 0.82rem; margin-bottom: 1rem; }
.proj-bullets { list-style: none; margin-bottom: 1rem; }
.proj-bullets li { color: var(--muted); font-size: 0.79rem; padding: 0.2rem 0 0.2rem 1.1rem; position: relative; }
.proj-bullets li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); }
.proj-links { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
.proj-link { font-size: 0.72rem; padding: 0.22rem 0.65rem; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); text-decoration: none; transition: border-color 0.2s, color 0.2s; }
.proj-link:hover { border-color: var(--accent); color: var(--accent); }
.tech-stack { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: auto; }
.tbadge { font-size: 0.66rem; padding: 0.18rem 0.5rem; background: rgba(52,211,153,.07); border: 1px solid rgba(52,211,153,.2); border-radius: 3px; color: var(--accent); }

/* ─────────── CERTIFICATIONS ─────────── */
#certificates { text-align: center; }
.cert-page-title { margin-bottom: 2.5rem; }
.cpt-main {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3.5vw, 2.4rem);
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), #f0fdf4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.cpt-sub { color: var(--muted); font-size: 0.88rem; margin-top: 0.5rem; max-width: 500px; margin-left: auto; margin-right: auto; }

.cert-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.8rem;
  max-width: 800px;
  margin: 0 auto;
}

/* flip card */
.cert-flip-card {
  height: 380px;
  perspective: 1000px;
  cursor: pointer;
}
.cert-flip-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.65s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
}
.cert-flip-card:hover .cert-flip-inner { transform: rotateY(180deg); }

.cert-flip-front, .cert-flip-back {
  position: absolute; inset: 0;
  border-radius: 14px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* front */
.cert-flip-front {
  background: #081008;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
}
.cert-img-wrap {
  flex: 1; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #f5f0e8;
}
.cert-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.cert-flip-info {
  padding: 1rem 1.2rem 1rem;
  background: #081008;
  text-align: left;
}
.cert-issuer-badge {
  display: inline-block;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.18rem 0.6rem; border-radius: 3px;
  margin-bottom: 0.4rem;
}
.cert-issuer-badge.cse { background: rgba(212,160,80,.15); color: #d4a050; border: 1px solid rgba(212,160,80,.3); }
.cert-issuer-badge.coursera { background: rgba(0,86,210,.15); color: #4d9ef5; border: 1px solid rgba(0,86,210,.3); }
.cert-issuer-badge { display: inline-block; background: rgba(249,115,22,0.18); border: 1px solid rgba(34,197,94,0.3); color: var(--accent); font-size: 0.68rem; padding: 0.15rem 0.6rem; border-radius: 4px; margin-bottom: 0.4rem; letter-spacing: 0.05em; }
.cert-flip-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem; color: var(--white); font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
.cert-flip-date { font-size: 0.73rem; color: var(--muted); }
.cert-hover-hint { font-size: 0.65rem; color: var(--accent); margin-top: 0.4rem; letter-spacing: 0.06em; }

/* back */
.cert-flip-back {
  background: linear-gradient(135deg, #13103a 0%, #0e1628 100%);
  border: 1px solid rgba(34,197,94,0.3);
  transform: rotateY(180deg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.8rem 1.6rem;
  text-align: center; gap: 0.5rem;
}
.cert-back-icon { font-size: 2.2rem; }
.cert-back-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; color: var(--white); line-height: 1.3; }
.cert-back-issuer { font-size: 0.75rem; color: var(--accent); }
.cert-back-date { font-size: 0.78rem; color: rgba(255,255,255,0.6); }
.cert-back-no { font-size: 0.68rem; color: var(--muted); }
.cert-back-desc { font-size: 0.78rem; color: rgba(255,255,255,0.5); line-height: 1.6; }
.cert-verify-btn {
  display: inline-block; margin-top: 0.4rem;
  background: var(--accent); color: #fff;
  padding: 0.4rem 1.1rem; border-radius: 6px;
  font-size: 0.75rem; font-weight: 600;
  text-decoration: none; transition: background 0.2s;
}
.cert-verify-btn:hover { background: #14532d; }

/* ─────────── CERTIFICATES (old — keep for tab inside resume) ─────────── */

/* ─────────── ACHIEVEMENTS ─────────── */
.achieve-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
.ach-item { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 9px 9px 0; padding: 1.2rem 1.4rem; transition: border-left-color 0.2s; }
.ach-item:hover { border-left-color: var(--accent); }
.ach-item h4 { font-family: 'Space Grotesk', sans-serif; color: var(--white); font-size: 0.88rem; margin-bottom: 0.3rem; }
.ach-item p { color: var(--muted); font-size: 0.77rem; }

/* ─────────── INTERNSHIPS ─────────── */
.timeline { position: relative; padding-left: 2rem; }
.timeline::before { display: none; }
.tl-item { position: relative; margin-bottom: 3rem; }
.tl-dot { position: absolute; left: -2.38rem; top: 5px; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); box-shadow: 0 0 12px var(--accent); }
.tl-period { font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.35rem; text-transform: uppercase; }
.tl-item h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.03rem; color: var(--white); margin-bottom: 0.2rem; }
.tl-company { color: var(--accent); font-size: 0.82rem; margin-bottom: 0.8rem; }
.tl-list { list-style: none; }
.tl-list li { color: var(--muted); font-size: 0.81rem; padding: 0.22rem 0 0.22rem 1.2rem; position: relative; }
.tl-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }

/* ─────────── COMPETITIVE PROGRAMMING ─────────── */
.cp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.2rem; }
.cp-card { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 1.5rem; text-align: center; transition: border-color 0.2s, transform 0.2s; }
.cp-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.cp-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
.cp-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 0.93rem; color: var(--white); margin-bottom: 0.3rem; }
.cp-card p { color: var(--muted); font-size: 0.79rem; }
.cp-badge { display: inline-block; margin-top: 0.7rem; background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--accent); font-size: 0.7rem; padding: 0.2rem 0.7rem; border-radius: 4px; }
.cp-note { margin-top: 2rem; background: var(--card); border: 1px dashed var(--border); border-radius: 10px; padding: 1.3rem 1.7rem; color: var(--muted); font-size: 0.83rem; }
.cp-note strong { color: var(--text); }

/* ─────────── RESEARCH ─────────── */
.research-box { background: var(--card); border: 1px dashed var(--border); border-radius: 12px; padding: 2.5rem; text-align: center; color: var(--muted); }

.research-box p { font-size: 0.83rem; max-width: 480px; margin: 0 auto; }

/* ─── CERT PDF PREVIEW ─── */
.cert-img-pdf { background: #f5f5f0; }
.cert-pdf-preview { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.4rem; padding:1rem; text-align:center; }
.cpdf-logo { font-size:1.3rem; font-weight:700; color:#0056d2; }

.cpdf-name { font-size:1rem; font-weight:700; color:#222; margin-top:0.3rem; }
.cpdf-course { font-size:0.63rem; color:#444; max-width:180px; line-height:1.4; margin-top:0.2rem; }

/* ─────────── CONTACT ─────────── */
#contact { text-align: center; }
.contact-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800; margin-bottom: 0.5rem;

  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-decoration: underline; text-decoration-color: rgba(34,197,94,0.4); text-underline-offset: 6px;
}

}

/* form */

  border-radius: 12px; padding: 1.6rem; display: block;
}
.cf-group { margin-bottom: 0.9rem; }

}
